services:
  - type: web
    name: explore-india-fullstack
    env: node
    buildCommand: 'cd frontend && npm install && npm run build && cd ../backend && npm install'
    startCommand: 'cd backend && npm start'
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODBURL
        sync: false
